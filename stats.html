<!doctype html>
<html lang="en" class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link stats — go</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script>
    tailwind.config = { darkMode: 'media' };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    }
  </style>
</head>
<body class="min-h-screen">
  <main class="mx-auto max-w-[600px] px-4 pt-16 pb-24">
    <div class="mb-6">
      <a href="/" class="text-sm text-zinc-500 dark:text-zinc-400 hover:text-indigo-500">← Shorten a link</a>
    </div>
    <h1 class="text-3xl font-bold tracking-tight">Link stats</h1>
    <p class="mt-2 text-zinc-500 dark:text-zinc-400">Append a code to the URL, e.g. <code class="font-mono text-indigo-500">/abc123/+</code></p>
    <div id="content" class="mt-8">
      <p class="text-zinc-500 dark:text-zinc-400">Open a stats page by visiting <code class="font-mono">/{code}/+</code>.</p>
    </div>
  </main>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (!code) return;

      const content = document.getElementById('content');
      content.innerHTML = '<p class="text-zinc-500 dark:text-zinc-400">Loading…</p>';

      (async () => {
        try {
          const res = await fetch('/api/stats/' + encodeURIComponent(code));
          if (res.status === 404) {
            content.innerHTML = '<p class="text-red-500">Link not found.</p>';
            return;
          }
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          const created = new Date(data.created_at * 1000).toLocaleDateString();
          content.innerHTML = [
            '<div class="p-4 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-lg">',
            '  <code class="font-mono text-base text-indigo-600 dark:text-indigo-400 break-all">' + escapeHtml(data.short) + '</code>',
            '</div>',
            '<dl class="mt-6 space-y-4">',
            '  <div><dt class="text-sm text-zinc-500 dark:text-zinc-400">Original</dt><dd class="mt-1 break-all"><a href="' + escapeHtml(data.url) + '" class="text-indigo-500 hover:text-indigo-600" rel="noopener noreferrer">' + escapeHtml(data.url) + '</a></dd></div>',
            '  <div><dt class="text-sm text-zinc-500 dark:text-zinc-400">Clicks</dt><dd class="mt-1 text-2xl font-semibold">' + data.clicks + '</dd></div>',
            '  <div><dt class="text-sm text-zinc-500 dark:text-zinc-400">Created</dt><dd class="mt-1">' + created + '</dd></div>',
            '</dl>'
          ].join('');
        } catch (err) {
          content.innerHTML = '<p class="text-red-500">Something went wrong.</p>';
        }
      })();
    })();

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
</body>
</html>
