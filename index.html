<!doctype html>
<html lang="en" class="bg-zinc-50 text-zinc-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shorten a link — go</title>
  <meta name="description" content="No tracking. No accounts. Just a shorter URL." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
            sans: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'caret': 'caret 1s steps(2) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(4px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            caret: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0' },
            },
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-feature-settings: "ss01", "calt" 0;
    }
    .typewriter {
      display: inline-block;
    }
    .typewriter::after {
      content: "▌";
      margin-left: 0.1em;
      color: #6366f1;
      animation: caret 1s steps(2) infinite;
      font-weight: 400;
    }
    /* Respect users who prefer reduced motion: drop the caret blink and
       pause the typewriter on a single static render of the text. */
    @media (prefers-reduced-motion: reduce) {
      .typewriter::after { animation: none; }
    }
  </style>
</head>
<body class="min-h-screen">
  <main class="mx-auto max-w-[560px] px-4 pt-24 pb-16">
    <h1
      id="headline"
      class="text-3xl sm:text-4xl font-semibold tracking-tight"
      aria-label="Shorten a link"
    ><span class="typewriter" data-text="Shorten a link."></span></h1>
    <p
      id="tagline"
      class="mt-3 text-base text-zinc-500"
      aria-label="No tracking. No accounts. Just a shorter URL."
    ><span class="typewriter" data-text="// no tracking. no accounts. just a shorter url."></span></p>

    <form id="form" action="/api/create" method="POST" class="mt-10" novalidate>
      <div>
        <label for="url" class="sr-only">URL</label>
        <input
          id="url"
          name="url"
          type="url"
          autofocus
          required
          placeholder="https://example.com/some/long/url"
          spellcheck="false"
          autocapitalize="off"
          class="w-full px-4 py-3 text-base bg-white border border-zinc-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder:text-zinc-400"
        />
      </div>
      <p id="error" class="hidden mt-3 text-sm text-red-500"></p>
      <button
        id="submit"
        type="submit"
        class="mt-4 w-full px-6 py-3 bg-indigo-500 hover:bg-indigo-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-zinc-50"
      >Shorten</button>
    </form>

    <div id="result" class="hidden mt-8 p-4 bg-white border border-zinc-200 rounded-lg animate-fade-in">
      <p class="text-xs uppercase tracking-wide text-zinc-500">Your short link</p>
      <div class="mt-2 flex items-center justify-between gap-3">
        <code id="short-url" class="font-mono text-base text-indigo-600 break-all"></code>
        <button
          id="copy"
          type="button"
          class="shrink-0 px-3 py-1.5 text-sm border border-zinc-300 rounded-md hover:bg-zinc-100 transition-colors"
        >Copy</button>
      </div>
      <p class="mt-3 text-xs text-zinc-500">
        <a id="stats-link" href="#" class="text-indigo-500 hover:text-indigo-600">View stats</a> · <a id="visit-link" href="#" class="text-indigo-500 hover:text-indigo-600" rel="noopener noreferrer" target="_blank">Visit</a>
      </p>
    </div>

    <footer class="mt-20 text-center text-xs text-zinc-400">
      self-hosted on cloudflare · <a href="/about.html" class="hover:text-indigo-500">about</a>
    </footer>
  </main>

  <script>
    (() => {
      // ── Typewriter loop ──────────────────────────────────────────────────
      // Each .typewriter element types out its data-text, holds for a beat,
      // then restarts. Headline and tagline run on independent timelines
      // (headline first, tagline shortly after) so the page feels alive on
      // every reload without the eye bouncing between two cursors at once.
      const TYPE_SPEED = 55;
      const ERASE_SPEED = 28;
      const HOLD_AFTER_TYPE = 1800;
      const HEADLINE_GAP = 320;

      const elements = Array.from(document.querySelectorAll('.typewriter'));
      elements.forEach((el) => {
        const full = el.dataset.text || el.textContent || '';
        el.textContent = '';
        el.dataset.full = full;
      });

      function runTypewriter(el, startDelay) {
        const full = el.dataset.full || '';
        let i = 0;
        let typing = true;

        const tick = () => {
          if (typing) {
            i++;
            el.textContent = full.slice(0, i);
            if (i >= full.length) {
              typing = false;
              setTimeout(tick, HOLD_AFTER_TYPE);
              return;
            }
            setTimeout(tick, TYPE_SPEED);
          } else {
            i--;
            el.textContent = full.slice(0, i);
            if (i <= 0) {
              typing = true;
              setTimeout(tick, 240);
              return;
            }
            setTimeout(tick, ERASE_SPEED);
          }
        };
        setTimeout(tick, startDelay);
      }

      if (elements[0]) runTypewriter(elements[0], 0);
      if (elements[1]) runTypewriter(elements[1], HEADLINE_GAP);

      // ── Form submit ──────────────────────────────────────────────────────
      const form = document.getElementById('form');
      const submit = document.getElementById('submit');
      const errorEl = document.getElementById('error');
      const result = document.getElementById('result');
      const shortEl = document.getElementById('short-url');
      const statsLink = document.getElementById('stats-link');
      const visitLink = document.getElementById('visit-link');
      const copyBtn = document.getElementById('copy');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
      }

      function hideError() {
        errorEl.textContent = '';
        errorEl.classList.add('hidden');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const url = document.getElementById('url').value.trim();
        if (!url) {
          showError('// error: enter a url to shorten.');
          return;
        }

        submit.disabled = true;
        submit.textContent = 'Shortening…';

        try {
          const res = await fetch('/api/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (!res.ok || !data.short) {
            showError('// error: ' + (data.error || 'something went wrong.'));
            submit.disabled = false;
            submit.textContent = 'Shorten';
            return;
          }
          shortEl.textContent = data.short;
          statsLink.href = data.short + '/+';
          visitLink.href = data.short;
          result.classList.remove('hidden');
          result.classList.remove('animate-fade-in');
          void result.offsetWidth;
          result.classList.add('animate-fade-in');
          submit.textContent = 'Shorten another';
          submit.disabled = false;
          document.getElementById('url').value = '';
        } catch (err) {
          showError('// error: network. try again.');
          submit.disabled = false;
          submit.textContent = 'Shorten';
        }
      });

      copyBtn.addEventListener('click', async () => {
        const text = shortEl.textContent || '';
        const original = copyBtn.textContent || 'Copy';
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = 'Copied!';
        } catch {
          copyBtn.textContent = 'Failed';
        }
        setTimeout(() => { copyBtn.textContent = original; }, 1500);
      });
    })();
  </script>
</body>
</html>
